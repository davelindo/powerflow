name: Nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Test
        run: |
          xcodebuild \
            -project Powerflow.xcodeproj \
            -scheme Powerflow \
            -destination "platform=macOS" \
            test

      - name: Verify layout snapshots
        if: ${{ env.POWERFLOW_VERIFY_LAYOUT_SNAPSHOTS == '1' }}
        run: ./scripts/verify_layout_snapshots.sh

      - name: Detect signing credentials
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_BUILD_KEYCHAIN_PASSWORD }}
          SIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          if [[ -n "$CERTIFICATE_BASE64" \
            && -n "$CERTIFICATE_PASSWORD" \
            && -n "$KEYCHAIN_PASSWORD" \
            && -n "$SIGN_IDENTITY" \
            && -n "$APPLE_ID" \
            && -n "$APPLE_TEAM_ID" \
            && -n "$APPLE_APP_SPECIFIC_PASSWORD" ]]; then
            echo "POWERFLOW_SIGNING_AVAILABLE=1" >> "$GITHUB_ENV"
          else
            echo "POWERFLOW_SIGNING_AVAILABLE=0" >> "$GITHUB_ENV"
            echo "Signing credentials are incomplete; building unsigned nightly artifact."
          fi

      - name: Import signing certificate
        if: ${{ env.POWERFLOW_SIGNING_AVAILABLE == '1' }}
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_BUILD_KEYCHAIN_PASSWORD }}
        run: |
          test -n "$CERTIFICATE_BASE64"
          test -n "$CERTIFICATE_PASSWORD"
          test -n "$KEYCHAIN_PASSWORD"
          KEYCHAIN_PATH="$RUNNER_TEMP/powerflow-signing.keychain-db"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/signing.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/signing.p12" -P "$CERTIFICATE_PASSWORD" -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "SIGNING_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Configure notarization
        if: ${{ env.POWERFLOW_SIGNING_AVAILABLE == '1' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          test -n "$APPLE_ID"
          test -n "$APPLE_TEAM_ID"
          test -n "$APPLE_APP_SPECIFIC_PASSWORD"
          xcrun notarytool store-credentials powerflow-notary \
            --keychain "$SIGNING_KEYCHAIN_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Build signed release
        if: ${{ env.POWERFLOW_SIGNING_AVAILABLE == '1' }}
        env:
          POWERFLOW_REQUIRE_SIGNING: "1"
          POWERFLOW_SIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_SIGNING_IDENTITY }}
          POWERFLOW_NOTARY_KEYCHAIN_PROFILE: powerflow-notary
          POWERFLOW_NOTARY_KEYCHAIN: ${{ env.SIGNING_KEYCHAIN_PATH }}
        run: ./scripts/build_release.sh

      - name: Build unsigned nightly
        if: ${{ env.POWERFLOW_SIGNING_AVAILABLE != '1' }}
        run: ./scripts/build_release.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: powerflow-dmg
          path: build/Powerflow.dmg
          if-no-files-found: error

      - name: Cleanup signing keychain
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/signing.p12"
          if [[ -n "${SIGNING_KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$SIGNING_KEYCHAIN_PATH" || true
          fi

  publish:
    runs-on: macos-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Download DMG artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: powerflow-dmg
          path: build

      - name: Update nightly tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f nightly
          git push -f origin nightly

      - name: Publish nightly release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: nightly
          name: Nightly
          prerelease: true
          body: "Nightly build from ${{ github.sha }}"
          files: |
            build/Powerflow.dmg
