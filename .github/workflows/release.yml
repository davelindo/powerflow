name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Validate release tag
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "Release publishing requires a version tag."
            exit 1
          fi
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PLIST_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Resources/Info.plist)"
          if [[ "$TAG_VERSION" != "$PLIST_VERSION" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match CFBundleShortVersionString ${PLIST_VERSION}."
            exit 1
          fi

      - name: Test
        run: |
          xcodebuild \
            -project Powerflow.xcodeproj \
            -scheme Powerflow \
            -destination "platform=macOS" \
            test

      - name: Verify layout snapshots
        if: ${{ env.POWERFLOW_VERIFY_LAYOUT_SNAPSHOTS == '1' }}
        run: ./scripts/verify_layout_snapshots.sh

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_BUILD_KEYCHAIN_PASSWORD }}
        run: |
          test -n "$CERTIFICATE_BASE64"
          test -n "$CERTIFICATE_PASSWORD"
          test -n "$KEYCHAIN_PASSWORD"
          KEYCHAIN_PATH="$RUNNER_TEMP/powerflow-signing.keychain-db"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/signing.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/signing.p12" -P "$CERTIFICATE_PASSWORD" -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "SIGNING_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Configure notarization
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          test -n "$APPLE_ID"
          test -n "$APPLE_TEAM_ID"
          test -n "$APPLE_APP_SPECIFIC_PASSWORD"
          xcrun notarytool store-credentials powerflow-notary \
            --keychain "$SIGNING_KEYCHAIN_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Build release
        env:
          POWERFLOW_REQUIRE_SIGNING: "1"
          POWERFLOW_SIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_SIGNING_IDENTITY }}
          POWERFLOW_NOTARY_KEYCHAIN_PROFILE: powerflow-notary
          POWERFLOW_NOTARY_KEYCHAIN: ${{ env.SIGNING_KEYCHAIN_PATH }}
        run: ./scripts/build_release.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: powerflow-dmg
          path: build/Powerflow.dmg
          if-no-files-found: error

      - name: Cleanup signing keychain
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/signing.p12"
          if [[ -n "${SIGNING_KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$SIGNING_KEYCHAIN_PATH" || true
          fi

  publish:
    runs-on: macos-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: powerflow-dmg
          path: build

      - name: Upload release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: |
            build/Powerflow.dmg
