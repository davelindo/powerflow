name: Powerflow

options:
  bundleIdPrefix: com.powerflow

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    GENERATE_INFOPLIST_FILE: NO

targets:
  Powerflow:
    type: application
    platform: macOS
    sources:
      - path: Sources
    resources:
      - path: Resources
    frameworks:
      - CoreBluetooth
      - IOKit
      - IOBluetooth
      - ServiceManagement
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.powerflow.app
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Powerflow.entitlements
        ENABLE_HARDENED_RUNTIME: YES
    scheme:
      testTargets:
        - PowerflowTests
  PowerflowTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/PowerflowTests
    dependencies:
      - target: Powerflow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.powerflow.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Powerflow.app/Contents/MacOS/Powerflow"
        BUNDLE_LOADER: "$(TEST_HOST)"
